# Interview registry — single source for primary pipeline discovery and portal alignment.
# Add a new interview: append an entry with globs matching files under Call Transcripts / Interview Summary Documents.
# portal_source_id must match apps/final-presentation/src/content/sources.ts when publishing to the portal.

metadata:
  version: 1
  transcripts_dir: Call Transcripts
  summaries_dir: Interview Summary Documents

# Quote bank rule (see research/README.md):
# - outputs/02_quote_bank.md is merged/synthesis master when produced by top-level pipeline
# - outputs/primary/02_quote_bank.md is Pipeline 1 primary quote extraction

interviews:
  - id: texas-state
    portal_source_id: cc-texas-state
    company_card_id: co-01
    status: published_portal
    vertical: higher-ed
    transcript_glob: 'CC_Research_Texas_State_Transcript*'
    summary_glob: 'Clear_Current_Interview_Summary_Texas_State.docx'
    corpus_labels:
      transcript: 'TX State Transcript'
      summary: 'TX State Summary'
    include_in_all_summaries_corpus: true

